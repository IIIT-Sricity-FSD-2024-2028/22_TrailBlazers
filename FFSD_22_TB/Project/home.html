<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wevents – My Events</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="one-unit">
      <div class="app">
        <div class="sidebar">
          
          <p class="role">Event Manager</p>
          <button class="menu-btn">
            <i class="fa-solid fa-bars"></i>My Events
          </button>
        </div>

        <div class="main">
          <div class="navbar" style="position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e2e8f0; border-radius: 0;">
            <div style="display:flex; align-items:center; gap:10px; color:var(--primary); font-size: 18px; font-weight: 700; margin-left: 10px;">
              <div style="width: 32px; height: 32px; background: var(--primary); color: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center;"><i class="fa-regular fa-calendar"></i></div> Wevents.com
            </div>
            <div></div>
            <div class="nav-right">
              <i class="fa-regular fa-bell" style="cursor: pointer"></i>
              <div class="profile-wrapper">
                <div class="profile" id="profileBtn">
                  <i class="fa-solid fa-user"></i>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                  <div class="ph">
                    <div>
                      <div style="font-weight: 600; font-size: 15px">
                        Alex Thompson
                      </div>
                      <div style="font-size: 12px; opacity: 0.8">
                        Lead Coordinator
                      </div>
                    </div>
                    <div class="av">AT</div>
                  </div>
                  <div class="pb">
                    <h4>My Account</h4>
                    <div class="pi">
                      <i class="fa-regular fa-user"></i>Alex Thompson
                    </div>
                    <div class="pi">
                      <i class="fa-regular fa-envelope"></i>alex.t@evnt.com
                    </div>
                    <div class="pi">
                      <i class="fa-regular fa-shield"></i>Lead Coordinator
                    </div>
                  </div>
                  <div class="pf">
                    <button class="logout-btn">
                      <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="ev-header">
            <div>
              <h2>Event Manager Dashboard</h2>
              <p>Manage all your events from here</p>
            </div>
          </div>

          <div class="content">
            <h2>My Events</h2>
            <p class="subtext">
              Manage your allocated events and review waiting list
            </p>

            <div class="stats" id="stats-container"></div>

            <div class="topbar" style="margin-bottom: 14px">
              <span class="sec-title" style="margin: 0">Allocated Events</span>
              <button class="btn btn-primary" onclick="openEventModal(-1)">
                <i class="fa-solid fa-plus"></i>Add Event
              </button>
            </div>
            <div id="events-container"></div>

            <div class="topbar" style="margin-top: 10px; margin-bottom: 14px">
              <span class="sec-title" style="margin: 0">Waiting List</span>
            </div>
            <div class="w-grid" id="waiting-list"></div>
          </div>
        </div>
      </div>

      <!-- EVENT MODAL -->
      <div class="modal-overlay" id="event-modal">
        <div class="modal">
          <h3 id="em-title">Add Event</h3>
          <div class="fg">
            <label>Event Title</label
            ><input
              id="f-title"
              placeholder="Tech Mumbai Innovation Summit 2026"
            />
          </div>
          <div class="fg">
            <label>Client / Organiser</label
            ><input id="f-client" placeholder="India Tech Council" />
          </div>
          <div class="frow">
            <div class="fg">
              <label>Date</label
              ><input id="f-date" placeholder="March 15–17, 2026" />
            </div>
            <div class="fg">
              <label>Location</label
              ><input
                id="f-location"
                placeholder="Jio World Convention Centre"
              />
            </div>
          </div>
          <div class="frow">
            <div class="fg">
              <label>Expected Attendees</label
              ><input id="f-people" placeholder="850 Expected" />
            </div>
            <div class="fg">
              <label>Status</label>
              <select id="f-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
              </select>
            </div>
          </div>
          <div class="fg">
            <label>Progress Note</label
            ><input id="f-progress" placeholder="Day 1 of 3" />
          </div>
          <div class="ma">
            <button class="bc" onclick="closeModal('event-modal')">
              Cancel
            </button>
            <button class="bs" onclick="saveEvent()">Save Event</button>
          </div>
        </div>
      </div>

      <div id="toast"></div>
      <script src="shared.js"></script>
      <script src="home.js"></script>
    </div>
  </body>
</html>
