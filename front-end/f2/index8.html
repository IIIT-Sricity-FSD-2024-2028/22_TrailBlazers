<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify Phone Number â€“ Wevents.com</title>
    <meta name="description" content="Enter the OTP sent to your phone number to verify your identity." />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style8.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- â•â•â•â•â•â•â•â•â•â•â•â•â•â• OTP VERIFY DIALOG â•â•â•â•â•â•â•â•â•â•â•â•â•â• -->
    <div class="dialog-wrapper">
      <dialog class="dialog" id="verify-dialog" open aria-modal="true" aria-labelledby="dialog-heading">

        <!-- Close button -->
        <button class="dialog-close" id="btn-close-dialog" type="button" aria-label="Close dialog">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1L13 13M13 1L1 13" stroke="#0f172a" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- Dialog header -->
        <header class="dialog-header">
          <h1 class="dialog-title" id="dialog-heading">Verify Phone Number</h1>
        </header>

        <!-- Body -->
        <div class="dialog-body">

          <!-- Phone icon -->
          <div class="phone-icon-wrap" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 12 19.79 19.79 0 0 1 1.64 3.42 2 2 0 0 1 3.62 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.83a16 16 0 0 0 6.29 6.29l.97-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 1.97z"/>
            </svg>
          </div>

          <!-- Description -->
          <p class="verify-desc">We've sent a verification code to</p>
          <p class="verify-phone">3214432354</p>

          <!-- OTP input form -->
          <form class="otp-form" id="otp-form" novalidate>

            <!-- OTP slots -->
            <div class="otp-group" id="otp-group" role="group" aria-label="One-time password digits">
              <input class="otp-slot" id="otp-1" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" autocomplete="one-time-code" aria-label="Digit 1" />
              <input class="otp-slot" id="otp-2" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" aria-label="Digit 2" />
              <input class="otp-slot" id="otp-3" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" aria-label="Digit 3" />
              <input class="otp-slot" id="otp-4" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" aria-label="Digit 4" />
              <input class="otp-slot" id="otp-5" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" aria-label="Digit 5" />
              <input class="otp-slot" id="otp-6" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" value="" aria-label="Digit 6" />
            </div>

            <!-- Resend -->
            <button class="btn-resend" id="btn-resend" type="button">Resend Code</button>

            <!-- Actions -->
            <div class="form-actions">
              <button class="btn-back" id="btn-back" type="button">Back</button>
              <button class="btn-verify" id="btn-verify" type="submit">Verify &amp; Continue</button>
            </div>

          </form>
        </div><!-- /dialog-body -->

      </dialog>
    </div><!-- /dialog-wrapper -->

    <script>
      // Auto-advance OTP slots on input
      const slots = document.querySelectorAll('.otp-slot');
      slots.forEach((slot, i) => {
        slot.addEventListener('input', () => {
          slot.value = slot.value.replace(/\D/g, '').slice(-1);
          if (slot.value && i < slots.length - 1) slots[i + 1].focus();
        });
        slot.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !slot.value && i > 0) slots[i - 1].focus();
        });
      });
    </script>

    <script src="app.js" defer></script>
  <script src="script8.js" defer></script>
</body>
</html>
